apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeskclaw-backend
  labels:
    app: nodeskclaw-backend
spec:
  replicas: 2                          # 生产至少 2 副本保证高可用
  selector:
    matchLabels:
      app: nodeskclaw-backend
  template:
    metadata:
      labels:
        app: nodeskclaw-backend
    spec:
      imagePullSecrets:
        - name: aliyun-registry        # 对应 6.3 步创建的 Secret
      containers:
        - name: nodeskclaw-backend
          image: registry.cn-hangzhou.aliyuncs.com/nodeskclaw/nodeskclaw-backend:v1.0.0  # 改成你的镜像地址
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nodeskclaw-secrets   # 对应 6.2 步创建的 Secret
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nodeskclaw-backend
  labels:
    app: nodeskclaw-backend
spec:
  type: ClusterIP
  selector:
    app: nodeskclaw-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
