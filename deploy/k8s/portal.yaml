apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeskclaw-portal
  labels:
    app: nodeskclaw-portal
spec:
  replicas: 2                          # 前端也至少 2 副本
  selector:
    matchLabels:
      app: nodeskclaw-portal
  template:
    metadata:
      labels:
        app: nodeskclaw-portal
    spec:
      imagePullSecrets:
        - name: aliyun-registry        # 对应 6.3 步创建的 Secret
      containers:
        - name: nodeskclaw-portal
          image: registry.cn-hangzhou.aliyuncs.com/nodeskclaw/nodeskclaw-portal:v1.0.0   # 改成你的镜像地址
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nodeskclaw-portal
  labels:
    app: nodeskclaw-portal
spec:
  type: ClusterIP
  selector:
    app: nodeskclaw-portal
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
